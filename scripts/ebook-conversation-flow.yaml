# EBook Conversation Workflow — Azure AI Foundry
#
# Full conversational workflow: questions → outline → approval → draft → done
# Branching via ConditionGroup, loop via GotoAction, ends with EndConversation.
#
# KEY LESSON: actions must be at ROOT level, not nested under trigger.
#
# Deploy:  python scripts/deploy_ebook_conversation_workflow.py
# Test:    Foundry portal → Build → Workflows → ebook-conversation-flow → Run Workflow
#
# Agents needed (deployed by same script):
#   ebook-writer-agent   — outline + draft generation (grounded in SharePoint)

kind: workflow
name: ebook-conversation-flow
trigger:
  kind: OnConversationStart
  id: trigger_wf

actions:

  # Step 1 — Collect topic (free text)
  - kind: Question
    id: ask-topic
    variable: Local.Topic
    entity: StringPrebuiltEntity
    skipQuestionMode: SkipOnFirstExecutionIfVariableHasValue
    prompt: "What topic should the ebook cover? (e.g. AI for HR teams, Digital Transformation for SMEs)"

  # Step 2 — Collect audience
  - kind: Question
    id: ask-audience
    variable: Local.Audience
    entity: StringPrebuiltEntity
    skipQuestionMode: SkipOnFirstExecutionIfVariableHasValue
    prompt: "Who is the target audience? (HR managers / Content and marketing teams / Executives and C-suite / IT leaders / General business professionals)"

  # Step 3 — Collect tone
  - kind: Question
    id: ask-tone
    variable: Local.Tone
    entity: StringPrebuiltEntity
    skipQuestionMode: SkipOnFirstExecutionIfVariableHasValue
    prompt: "What tone should the ebook use? (Professional and clear / Conversational and approachable / Technical and detailed / Motivational and inspiring)"

  # Step 4 — Collect chapter count
  - kind: Question
    id: ask-chapters
    variable: Local.Chapters
    entity: StringPrebuiltEntity
    skipQuestionMode: SkipOnFirstExecutionIfVariableHasValue
    prompt: "How many chapters? (3 — short guide / 6 — standard ebook / 9 — comprehensive)"

  # Step 5 — Generate outline via ebook-writer-agent (SharePoint-grounded)
  - kind: InvokeAzureAgent
    id: generate-outline
    agent:
      name: ebook-writer-agent
    conversationId: =System.ConversationId
    input:
      messages: =Concatenate("Generate a structured ebook outline. Topic: ", Local.Topic, " | Audience: ", Local.Audience, " | Tone: ", Local.Tone, " | Chapters: ", Local.Chapters)
    output:
      messages: Local.OutlineResult
      autoSend: false

  # Step 6 — Show outline and ask for approval (human-in-the-loop)
  - kind: Question
    id: ask-approval
    variable: Local.Approval
    entity: StringPrebuiltEntity
    skipQuestionMode: SkipOnFirstExecutionIfVariableHasValue
    prompt: =Concatenate(Text(Last(Local.OutlineResult)), " — Does this outline look good? (yes / no)")

  # Step 7 — Branch on approval
  - kind: ConditionGroup
    id: approval-branch
    conditions:

      # Approved → generate full draft
      - id: if-approved
        condition: =!IsBlank(Find("yes", Lower(Local.Approval)))
        actions:
          - kind: InvokeAzureAgent
            id: generate-draft
            agent:
              name: ebook-writer-agent
            conversationId: =System.ConversationId
            input:
              messages: =Last(Local.OutlineResult)
            output:
              messages: Local.DraftResult
              autoSend: true
          - kind: EndConversation
            id: end-success

    # Not approved → restart from topic question
    elseActions:
      - kind: GotoAction
        id: restart
        actionId: ask-topic
